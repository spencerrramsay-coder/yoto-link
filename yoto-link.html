<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoto Link - Playlist Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .sidebar-header h1 {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .user-profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 12px;
            color: #999;
        }

        .nav-menu {
            flex: 1;
            padding: 10px 0;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: #f5f5f5;
            border-left-color: #667eea;
        }

        .nav-item.active {
            background: #f0f4ff;
            border-left-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }

        .nav-icon {
            font-size: 18px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .btn-logout {
            width: 100%;
            padding: 10px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn-logout:hover {
            background: #ff5252;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            color: #333;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            background: rgba(255, 255, 255, 0.95);
            padding: 0 40px;
            margin-left: -40px;
            margin-right: -40px;
            padding-left: 40px;
            padding-right: 40px;
        }

        .tab {
            padding: 15px 0;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #999;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 12px;
            color: #999;
        }

        .card-body {
            margin-bottom: 15px;
        }

        .card-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-online {
            background: #d4edda;
            color: #155724;
        }

        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-actions .btn {
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .playlist-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .playlist-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: #667eea;
            color: white;
        }

        .playlist-item.selected {
            background: #667eea;
            color: white;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .login-box .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-header h1,
            .nav-item span:not(.nav-icon),
            .user-profile,
            .sidebar-footer {
                display: none;
            }

            .nav-item {
                justify-content: center;
                padding: 15px;
            }

            .content {
                padding: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 15px 20px;
            }

            .header h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <div class="login-logo">🎵</div>
            <h1 class="login-title">Yoto Link</h1>
            <p class="login-subtitle">Connect your playlists to physical cards</p>
            <button class="btn btn-primary" onclick="initiateOAuth()" style="width: 100%; padding: 15px; font-size: 16px; margin-bottom: 10px;">
                🔐 Sign in with Yoto
            </button>
            <button class="btn btn-secondary" onclick="demoMode()" style="width: 100%; padding: 15px; font-size: 16px;">
                🎮 Try Demo Mode
            </button>
        </div>
    </div>

    <div id="appScreen" class="container" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🎵 Yoto Link</h1>
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">user@example.com</div>
                </div>
            </div>

            <div class="nav-menu">
                <div class="nav-item active" onclick="switchTab('playlists')">
                    <span class="nav-icon">🎶</span>
                    <span>Playlists</span>
                </div>
                <div class="nav-item" onclick="switchTab('cards')">
                    <span class="nav-icon">🎴</span>
                    <span>Cards</span>
                </div>
                <div class="nav-item" onclick="switchTab('devices')">
                    <span class="nav-icon">📱</span>
                    <span>Devices</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h2 id="pageTitle">Playlists</h2>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="refreshData()">
                        🔄 Refresh
                    </button>
                </div>
            </div>

            <div class="content">
                <!-- Playlists Tab -->
                <div id="playlistsTab" class="tab-content active">
                    <div id="playlistsContainer" class="grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading playlists...
                        </div>
                    </div>
                </div>

                <!-- Cards Tab -->
                <div id="cardsTab" class="tab-content">
                    <div id="cardsContainer" class="grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading cards...
                        </div>
                    </div>
                </div>

                <!-- Devices Tab -->
                <div id="devicesTab" class="tab-content">
                    <div id="devicesContainer" class="grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading devices...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Link Playlist Modal -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Link Playlist to Card</div>
            <div class="modal-body">
                <div class="card-info" style="margin-bottom: 15px;">
                    <strong>Card:</strong>
                    <span id="modalCardName">Card Name</span>
                </div>
                <div class="playlist-list" id="playlistListModal">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeLinkModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmLinkPlaylist()">Link</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            clientId: 'ovKuCLXw1E7xSMrFOYDQdm2jHayEzW8T',
            clientSecret: '52I3qQuyVRXGwUyjYngEVVIuo5gcV3huYKuqyeKnrOCthzPsDZ9brYj0r0WpaHE2',
            redirectUri: window.location.href.split('?')[0],
            apiBase: 'https://api.yoto.com/v1',
            oauthEndpoint: 'https://oauth.yoto.com/authorize'
        };

        // State Management
        let appState = {
            isDemo: false,
            user: null,
            token: null,
            playlists: [],
            cards: [],
            devices: [],
            cardPlaylistLinks: {},
            selectedCard: null,
            selectedPlaylist: null
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            checkOAuthCallback();
            checkExistingToken();
        });

        // Check for OAuth callback
        function checkOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');

            if (code) {
                exchangeAuthCode(code);
            }
        }

        // Check for existing token
        function checkExistingToken() {
            const savedToken = localStorage.getItem('yoto_token');
            if (savedToken) {
                appState.token = savedToken;
                showApp();
                loadUserData();
            }
        }

        // Initiate OAuth flow
        function initiateOAuth() {
            const state = Math.random().toString(36).substring(7);
            localStorage.setItem('oauth_state', state);

            const oauthUrl = new URL(CONFIG.oauthEndpoint);
            oauthUrl.searchParams.append('client_id', CONFIG.clientId);
            oauthUrl.searchParams.append('response_type', 'code');
            oauthUrl.searchParams.append('redirect_uri', CONFIG.redirectUri);
            oauthUrl.searchParams.append('scope', 'playlists devices cards');
            oauthUrl.searchParams.append('state', state);

            window.location.href = oauthUrl.toString();
        }

        // Exchange authorization code for token
        async function exchangeAuthCode(code) {
            try {
                const response = await fetch(`${CONFIG.apiBase}/oauth/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        grant_type: 'authorization_code',
                        code: code,
                        client_id: CONFIG.clientId,
                        client_secret: CONFIG.clientSecret,
                        redirect_uri: CONFIG.redirectUri
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    appState.token = data.access_token;
                    localStorage.setItem('yoto_token', appState.token);
                    
                    // Clear URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    showApp();
                    loadUserData();
                } else {
                    console.error('Token exchange failed');
                    // Fallback to demo mode
                    demoMode();
                }
            } catch (error) {
                console.error('OAuth error:', error);
                demoMode();
            }
        }

        // Demo Mode
        function demoMode() {
            appState.isDemo = true;
            appState.user = {
                id: 'user_demo_123',
                name: 'Demo User',
                email: 'demo@yoto.app',
                avatar: null
            };

            appState.playlists = [
                { id: 'p1', name: 'Morning Routine', trackCount: 15, image: '🌅' },
                { id: 'p2', name: 'Bedtime Stories', trackCount: 8, image: '🌙' },
                { id: 'p3', name: 'Learning & Music', trackCount: 22, image: '📚' },
                { id: 'p4', name: 'Wake Up Classics', trackCount: 10, image: '🎺' }
            ];

            appState.cards = [
                { id: 'c1', name: 'Card 1', cardCode: 'YOTO001' },
                { id: 'c2', name: 'Card 2', cardCode: 'YOTO002' },
                { id: 'c3', name: 'Card 3', cardCode: 'YOTO003' }
            ];

            appState.devices = [
                { id: 'd1', name: 'Living Room Yoto', status: 'online', isPlaying: false },
                { id: 'd2', name: 'Bedroom Yoto', status: 'online', isPlaying: true },
                { id: 'd3', name: 'Kitchen Yoto', status: 'offline', isPlaying: false }
            ];

            appState.cardPlaylistLinks = {
                'c1': 'p1',
                'c2': 'p2'
            };

            showApp();
            renderAllData();
        }

        // Load user data from API
        async function loadUserData() {
            try {
                // Get user info
                const userResponse = await fetch(`${CONFIG.apiBase}/user`, {
                    headers: {
                        'Authorization': `Bearer ${appState.token}`
                    }
                });

                if (userResponse.ok) {
                    const userData = await userResponse.json();
                    appState.user = userData;
                } else {
                    // Fallback user
                    appState.user = { name: 'Yoto User', email: 'user@yoto.app' };
                }

                // Get playlists
                const playlistResponse = await fetch(`${CONFIG.apiBase}/playlists`, {
                    headers: {
                        'Authorization': `Bearer ${appState.token}`
                    }
                });

                if (playlistResponse.ok) {
                    const playlistData = await playlistResponse.json();
                    appState.playlists = playlistData.playlists || [];
                }

                // Get cards
                const cardResponse = await fetch(`${CONFIG.apiBase}/cards`, {
                    headers: {
                        'Authorization': `Bearer ${appState.token}`
                    }
                });

                if (cardResponse.ok) {
                    const cardData = await cardResponse.json();
                    appState.cards = cardData.cards || [];
                }

                // Get devices
                const deviceResponse = await fetch(`${CONFIG.apiBase}/devices`, {
                    headers: {
                        'Authorization': `Bearer ${appState.token}`
                    }
                });

                if (deviceResponse.ok) {
                    const deviceData = await deviceResponse.json();
                    appState.devices = deviceData.devices || [];
                }

                renderAllData();
            } catch (error) {
                console.error('Data loading error:', error);
                renderAllData();
            }
        }

        // Render all data
        function renderAllData() {
            updateUserProfile();
            renderPlaylists();
            renderCards();
            renderDevices();
        }

        // Update user profile
        function updateUserProfile() {
            document.getElementById('userName').textContent = appState.user?.name || 'User';
            document.getElementById('userEmail').textContent = appState.user?.email || '';

            const avatarEl = document.getElementById('userAvatar');
            if (appState.user?.avatar) {
                avatarEl.innerHTML = `<img src="${appState.user.avatar}" alt="User Avatar">`;
            } else {
                const initial = (appState.user?.name || 'U')[0].toUpperCase();
                avatarEl.textContent = initial;
            }
        }

        // Render playlists
        function renderPlaylists() {
            const container = document.getElementById('playlistsContainer');
            
            if (appState.playlists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🎵</div>
                        <h3>No Playlists Found</h3>
                        <p>Create a playlist in your Yoto app to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = appState.playlists.map(playlist => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">${playlist.image || '🎶'}</div>
                        <div>
                            <div class="card-title">${playlist.name}</div>
                            <div class="card-subtitle">${playlist.trackCount || 0} tracks</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-info">
                            <strong>ID:</strong> ${playlist.id}
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-small" onclick="playPlaylist('${playlist.id}')">
                            ▶️ Play
                        </button>
                        <button class="btn btn-secondary btn-small" onclick="sharePlaylist('${playlist.id}')">
                            🔗 Share
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Render cards
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            
            if (appState.cards.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🎴</div>
                        <h3>No Cards Found</h3>
                        <p>Register a physical Yoto card to link playlists</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = appState.cards.map(card => {
                const linkedPlaylist = appState.playlists.find(p => p.id === appState.cardPlaylistLinks[card.id]);
                return `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon">🎴</div>
                            <div>
                                <div class="card-title">${card.name}</div>
                                <div class="card-subtitle">${card.cardCode || 'Card'}</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="card-info">
                                <strong>Linked Playlist:</strong>
                            </div>
                            <div class="card-info" style="margin-bottom: 15px;">
                                ${linkedPlaylist ? `🎶 ${linkedPlaylist.name}` : '❌ Not linked'}
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-primary btn-small" onclick="openLinkModal('${card.id}')">
                                🔗 Link Playlist
                            </button>
                            ${linkedPlaylist ? `
                                <button class="btn btn-secondary btn-small" onclick="unlinkPlaylist('${card.id}')">
                                    ❌ Unlink
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render devices
        function renderDevices() {
            const container = document.getElementById('devicesContainer');
            
            if (appState.devices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📱</div>
                        <h3>No Devices Found</h3>
                        <p>Connect a Yoto device to control it from here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = appState.devices.map(device => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📱</div>
                        <div>
                            <div class="card-title">${device.name}</div>
                            <div class="card-subtitle">
                                <span class="status-badge ${device.status === 'online' ? 'status-online' : 'status-offline'}">
                                    ${device.status}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-info">
                            <strong>Status:</strong>
                            ${device.isPlaying ? '▶️ Playing' : '⏸️ Stopped'}
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-small" onclick="playDevice('${device.id}')" ${device.status === 'offline' ? 'disabled' : ''}>
                            ▶️ Play
                        </button>
                        <button class="btn btn-secondary btn-small" onclick="stopDevice('${device.id}')" ${device.status === 'offline' ? 'disabled' : ''}>
                            ⏹️ Stop
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Link playlist modal
        function openLinkModal(cardId) {
            appState.selectedCard = cardId;
            const card = appState.cards.find(c => c.id === cardId);
            document.getElementById('modalCardName').textContent = card?.name || 'Card';

            const playlistList = document.getElementById('playlistListModal');
            playlistList.innerHTML = appState.playlists.map(p => {
                const isSelected = appState.cardPlaylistLinks[cardId] === p.id;
                return `
                    <div class="playlist-item ${isSelected ? 'selected' : ''}" onclick="selectPlaylist('${p.id}')">
                        <span>${p.name}</span>
                        <span>${isSelected ? '✓' : ''}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('linkModal').classList.add('active');
        }

        function closeLinkModal() {
            document.getElementById('linkModal').classList.remove('active');
            appState.selectedCard = null;
            appState.selectedPlaylist = null;
        }

        function selectPlaylist(playlistId) {
            appState.selectedPlaylist = playlistId;
            const items = document.querySelectorAll('.playlist-item');
            items.forEach(item => item.classList.remove('selected'));
            event.target.closest('.playlist-item').classList.add('selected');
        }

        function confirmLinkPlaylist() {
            if (appState.selectedCard && appState.selectedPlaylist) {
                appState.cardPlaylistLinks[appState.selectedCard] = appState.selectedPlaylist;
                renderCards();
                closeLinkModal();
                console.log(`Card ${appState.selectedCard} linked to playlist ${appState.selectedPlaylist}`);
            }
        }

        function unlinkPlaylist(cardId) {
            delete appState.cardPlaylistLinks[cardId];
            renderCards();
        }

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active class from nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Show selected tab
            const tabMap = {
                'playlists': 'playlistsTab',
                'cards': 'cardsTab',
                'devices': 'devicesTab'
            };

            document.getElementById(tabMap[tabName])?.classList.add('active');
            event.target.closest('.nav-item').classList.add('active');

            const titleMap = {
                'playlists': 'Playlists',
                'cards': 'Yoto Cards',
                'devices': 'Devices'
            };

            document.getElementById('pageTitle').textContent = titleMap[tabName];
        }

        // Device control
        function playDevice(deviceId) {
            const device = appState.devices.find(d => d.id === deviceId);
            if (device) {
                device.isPlaying = true;
                renderDevices();
                console.log(`Playing on device ${deviceId}`);
            }
        }

        function stopDevice(deviceId) {
            const device = appState.devices.find(d => d.id === deviceId);
            if (device) {
                device.isPlaying = false;
                renderDevices();
                console.log(`Stopped device ${deviceId}`);
            }
        }

        function playPlaylist(playlistId) {
            console.log(`Playing playlist ${playlistId}`);
            alert('🎶 Playing playlist on your device');
        }

        function sharePlaylist(playlistId) {
            const playlist = appState.playlists.find(p => p.id === playlistId);
            const shareUrl = `${window.location.origin}?playlist=${playlistId}`;
            console.log(`Share URL: ${shareUrl}`);
            alert(`🔗 Share this link:\n${shareUrl}`);
        }

        // Refresh data
        function refreshData() {
            if (appState.isDemo) {
                renderAllData();
            } else {
                loadUserData();
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('yoto_token');
            appState = {
                isDemo: false,
                user: null,
                token: null,
                playlists: [],
                cards: [],
                devices: [],
                cardPlaylistLinks: {},
                selectedCard: null,
                selectedPlaylist: null
            };
            hideApp();
        }

        // UI Helpers
        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
        }

        function hideApp() {
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
